<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <title>E-Bike Tracker</title>
  <script>
    // GitHub Pages SPA redirect trick:
    // Store the full path in sessionStorage and redirect to index.html
    sessionStorage.setItem('redirect', location.href);
    location.replace(location.origin + location.pathname.split('/').slice(0, 2).join('/'));
  </script>
</head>
<body></body>
</html>
